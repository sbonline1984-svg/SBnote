<!DOCTYPE html>
<html lang="as">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>হিচাপৰ বহী</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cover: #5C2A2A;
    --cover-dark: #451f1f;
    --paper: #F6EFDD;
    --paper-line: #DCC9A3;
    --margin-red: #B0433C;
    --ink: #2B2A28;
    --ink-soft: #6b5f4f;
    --stamp-green: #2F5D45;
    --stamp-green-dark: #23452f;
    --gold: #A9762F;
    --danger: #A9433B;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--cover);
    background-image:
      radial-gradient(circle at 10% 10%, rgba(255,255,255,0.04), transparent 40%),
      radial-gradient(circle at 90% 90%, rgba(255,255,255,0.03), transparent 40%);
    min-height: 100vh;
    font-family: 'Hind Siliguri', sans-serif;
    color: var(--ink);
    padding: clamp(12px, 4vw, 48px);
    display:flex;
    justify-content:center;
  }
  .book{
    width: 100%;
    max-width: 920px;
  }
  .book-title{
    text-align:center;
    margin-bottom: 18px;
  }
  .book-title h1{
    font-family: 'Tiro Bangla', serif;
    color: #F3E7C9;
    font-size: clamp(28px, 5vw, 42px);
    margin: 0 0 4px 0;
    letter-spacing: 0.5px;
  }
  .book-title p{
    color: #d8c39a;
    font-size: 14px;
    margin: 0;
    letter-spacing: 1px;
  }
  .page{
    background: var(--paper);
    background-image: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 38px,
      var(--paper-line) 39px
    );
    border-radius: 4px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35), 0 2px 0 rgba(255,255,255,0.4) inset;
    padding: 28px clamp(14px, 4vw, 36px) 32px;
    position: relative;
    border: 1px solid #cbb488;
  }
  .page::before{
    content:"";
    position:absolute;
    top:0; bottom:0;
    left: clamp(38px, 8vw, 64px);
    width: 2px;
    background: var(--margin-red);
    opacity: 0.55;
  }
  .top-row{
    display:flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 18px;
    padding-left: clamp(46px, 9vw, 72px);
    gap: 12px;
    flex-wrap: wrap;
  }
  .top-row .label{
    font-family:'Tiro Bangla', serif;
    font-size: 20px;
    color: var(--ink);
  }
  .top-row .date-today{
    font-size: 13px;
    color: var(--ink-soft);
  }
  table{
    width: 100%;
    border-collapse: collapse;
    margin-left: 0;
  }
  thead th{
    font-family:'Tiro Bangla', serif;
    font-weight: 400;
    font-size: 15px;
    color: #F3E7C9;
    background: var(--cover-dark);
    padding: 10px 8px;
    text-align: left;
    position: sticky;
    top:0;
  }
  thead th:first-child{ padding-left: clamp(46px, 9vw, 72px); border-radius: 4px 0 0 0; }
  thead th:last-child{ border-radius: 0 4px 0 0; text-align:center; }
  tbody td{
    padding: 8px 8px;
    vertical-align: middle;
    border-bottom: none;
  }
  tbody td:first-child{ padding-left: clamp(46px, 9vw, 72px); }
  tbody tr:hover{ background: rgba(176,67,60,0.05); }
  .sl{
    font-family:'Tiro Bangla', serif;
    font-size: 16px;
    color: var(--ink-soft);
    width: 40px;
  }
  input[type="text"], input[type="number"], input[type="date"]{
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px dashed #b6a074;
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 15px;
    color: var(--ink);
    padding: 4px 2px;
    outline: none;
  }
  input[type="text"]:focus, input[type="number"]:focus, input[type="date"]{
    border-bottom: 1px solid var(--margin-red);
  }
  input[type="number"]{ text-align:right; }
  .col-particulars{ width: 38%; }
  .col-price{ width: 18%; }
  .col-date{ width: 22%; }
  .col-action{ width: 10%; text-align:center; }
  .del-btn{
    background:none;
    border:none;
    color: var(--danger);
    font-size: 18px;
    cursor:pointer;
    line-height:1;
    padding: 4px 8px;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .del-btn:hover{ background: rgba(169,67,59,0.12); }
  .add-row{
    display:flex;
    justify-content: flex-start;
    padding-left: clamp(46px, 9vw, 72px);
    margin-top: 14px;
  }
  .add-btn{
    font-family: 'Hind Siliguri', sans-serif;
    font-weight: 600;
    font-size: 14px;
    background: transparent;
    border: 1.5px dashed var(--gold);
    color: #7a5420;
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .add-btn:hover{
    background: rgba(169,118,47,0.1);
    border-style: solid;
  }
  .total-box{
    margin-top: 26px;
    margin-left: clamp(46px, 9vw, 72px);
    display:flex;
    align-items:center;
    justify-content: flex-end;
    gap: 14px;
    flex-wrap: wrap;
  }
  .total-stamp{
    display:flex;
    align-items:center;
    gap: 14px;
    background: var(--stamp-green);
    color: #F3E7C9;
    padding: 12px 22px;
    border-radius: 6px;
    box-shadow: 2px 3px 0 var(--stamp-green-dark);
    transform: rotate(-1deg);
  }
  .total-stamp .t-label{
    font-family: 'Tiro Bangla', serif;
    font-size: 15px;
    letter-spacing: 1px;
    opacity: 0.9;
  }
  .total-stamp .t-value{
    font-family: 'Tiro Bangla', serif;
    font-size: 24px;
    font-weight: 400;
  }
  .empty-note{
    padding-left: clamp(46px, 9vw, 72px);
    color: var(--ink-soft);
    font-style: italic;
    font-size: 14px;
    margin-top: 14px;
  }
  .status-note{
    text-align:center;
    color: #d8c39a;
    font-size: 12px;
    margin-top: 14px;
  }
  @media (max-width: 560px){
    thead th:nth-child(2), thead th:nth-child(3){ font-size: 13px; }
    .col-particulars{ width: 34%; }
  }
</style>
</head>
<body>
<div class="book">
  <div class="book-title">
    <h1>হিচাপৰ বহী</h1>
    <p>দৈনন্দিন খৰচৰ টুকুৰা টুকুৰা হিচাপ</p>
  </div>
  <div class="page">
    <div class="top-row">
      <span class="label">খৰচৰ বিৱৰণ</span>
      <span class="date-today" id="todayDate"></span>
    </div>
    <table>
      <thead>
        <tr>
          <th class="sl">SL.NO.</th>
          <th class="col-particulars">Particulars</th>
          <th class="col-price">দাম (₹)</th>
          <th class="col-date">খৰচৰ তাৰিখ</th>
          <th class="col-action">✕</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty-note" id="emptyNote" style="display:none;">এতিয়ালৈকে কোনো প্ৰৱিষ্টি নাই। তলৰ বুটাম টিপি নতুন খৰচ যোগ কৰক।</div>
    <div class="add-row">
      <button class="add-btn" id="addBtn">+ নতুন প্ৰৱিষ্টি যোগ কৰক</button>
    </div>
    <div class="total-box">
      <div class="total-stamp">
        <span class="t-label">মুঠ খৰচ</span>
        <span class="t-value">₹<span id="totalValue">0</span></span>
      </div>
    </div>
    <div class="status-note" id="statusNote"></div>
  </div>
</div>

<script>
const rowsBody = document.getElementById('rows');
const totalValueEl = document.getElementById('totalValue');
const emptyNote = document.getElementById('emptyNote');
const statusNote = document.getElementById('statusNote');
const STORAGE_KEY = 'expense-entries';

let entries = [];

document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'long', year:'numeric' });

function todayISO(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function makeEntry(particulars='', price='', date=todayISO()){
  return { id: 'e' + Date.now() + Math.random().toString(36).slice(2,7), particulars, price, date };
}

function renderRows(){
  rowsBody.innerHTML = '';
  emptyNote.style.display = entries.length === 0 ? 'block' : 'none';
  entries.forEach((entry, idx) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="sl">${idx + 1}</td>
      <td class="col-particulars"><input type="text" placeholder="যেনে: বজাৰৰ সামগ্ৰী" value="${escapeAttr(entry.particulars)}" data-id="${entry.id}" data-field="particulars"></td>
      <td class="col-price"><input type="number" min="0" step="any" placeholder="0" value="${entry.price}" data-id="${entry.id}" data-field="price"></td>
      <td class="col-date"><input type="date" value="${entry.date}" data-id="${entry.id}" data-field="date"></td>
      <td class="col-action"><button class="del-btn" data-id="${entry.id}" title="মচি পেলাওক">✕</button></td>
    `;
    rowsBody.appendChild(tr);
  });
  attachHandlers();
  updateTotal();
}

function escapeAttr(str){
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
}

function attachHandlers(){
  rowsBody.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', (e) => {
      const id = e.target.dataset.id;
      const field = e.target.dataset.field;
      const entry = entries.find(en => en.id === id);
      if(entry){
        entry[field] = e.target.value;
        if(field === 'price') updateTotal();
        saveEntries();
      }
    });
  });
  rowsBody.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const id = e.target.dataset.id;
      entries = entries.filter(en => en.id !== id);
      renderRows();
      saveEntries();
    });
  });
}

function updateTotal(){
  const total = entries.reduce((sum, en) => sum + (parseFloat(en.price) || 0), 0);
  totalValueEl.textContent = total.toLocaleString('en-IN', { maximumFractionDigits: 2 });
}

function saveEntries(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    statusNote.textContent = '';
  }catch(err){
    statusNote.textContent = 'সংৰক্ষণ কৰোঁতে অসুবিধা হৈছে।';
  }
}

function loadEntries(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      entries = JSON.parse(raw);
    }
  }catch(err){
    entries = [];
  }
  if(entries.length === 0){
    entries = [makeEntry()];
  }
  renderRows();
}

document.getElementById('addBtn').addEventListener('click', () => {
  entries.push(makeEntry());
  renderRows();
  saveEntries();
  const inputs = rowsBody.querySelectorAll('tr:last-child input[data-field="particulars"]');
  if(inputs.length) inputs[0].focus();
});

loadEntries();
</script>
</body>
</html>
